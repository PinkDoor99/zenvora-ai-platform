# Zenvora AI Platform - Kubernetes Deployment Configuration
# Enterprise-grade auto-scaling and load balancing

apiVersion: v1
kind: Namespace
metadata:
  name: zenvora-prod
  labels:
    name: zenvora-prod
    environment: production

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: zenvora-config
  namespace: zenvora-prod
data:
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "zenvora_production"
  API_RATE_LIMIT: "1000"
  ENABLE_ANALYTICS: "true"
  ENABLE_COLLABORATION: "true"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: zenvora-secrets
  namespace: zenvora-prod
type: Opaque
data:
  DB_PASSWORD: <base64-encoded-db-password>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
  SESSION_SECRET: <base64-encoded-session-secret>
  SENTRY_DSN: <base64-encoded-sentry-dsn>

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zenvora-prod
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: zenvora-config
              key: DB_NAME
        - name: POSTGRES_USER
          value: zenvora_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
      storageClassName: fast-ssd

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: zenvora-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Persistent Volume Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: zenvora-prod
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-ssd

---
# Main Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenvora-app
  namespace: zenvora-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zenvora-app
  template:
    metadata:
      labels:
        app: zenvora-app
    spec:
      containers:
      - name: zenvora-app
        image: zenvora/platform:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: zenvora-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: DB_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: JWT_SECRET
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: SESSION_SECRET
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
# Collaboration Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenvora-collaboration
  namespace: zenvora-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zenvora-collaboration
  template:
    metadata:
      labels:
        app: zenvora-collaboration
    spec:
      containers:
      - name: collaboration
        image: zenvora/collaboration:latest
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: zenvora-config
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zenvora-secrets
              key: REDIS_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"

---
# Horizontal Pod Autoscaler for Main App
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zenvora-app-hpa
  namespace: zenvora-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zenvora-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Max

---
# Horizontal Pod Autoscaler for Collaboration Server
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zenvora-collaboration-hpa
  namespace: zenvora-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zenvora-collaboration
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Services
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: zenvora-prod
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: zenvora-prod
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: zenvora-app-service
  namespace: zenvora-prod
spec:
  selector:
    app: zenvora-app
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: zenvora-collaboration-service
  namespace: zenvora-prod
spec:
  selector:
    app: zenvora-collaboration
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP

---
# Ingress for Load Balancing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zenvora-ingress
  namespace: zenvora-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - zenvora.com
    - www.zenvora.com
    secretName: zenvora-tls
  rules:
  - host: zenvora.com
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: zenvora-app-service
            port:
              number: 80
      - path: /socket.io(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: zenvora-collaboration-service
            port:
              number: 3003
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: zenvora-app-service
            port:
              number: 80
  - host: www.zenvora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zenvora-app-service
            port:
              number: 80

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zenvora-network-policy
  namespace: zenvora-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: zenvora-app
    - podSelector:
        matchLabels:
          app: zenvora-collaboration
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    - podSelector:
        matchLabels:
          app: redis
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zenvora-app-pdb
  namespace: zenvora-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: zenvora-app

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zenvora-collaboration-pdb
  namespace: zenvora-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: zenvora-collaboration

---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: zenvora-quota
  namespace: zenvora-prod
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "20"
    configmaps: "20"

---
# Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: zenvora-limits
  namespace: zenvora-prod
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zenvora-app-monitor
  namespace: zenvora-prod
  labels:
    app: zenvora-app
spec:
  selector:
    matchLabels:
      app: zenvora-app
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# Vertical Pod Autoscaler
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: zenvora-app-vpa
  namespace: zenvora-prod
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zenvora-app
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: zenvora-app
      minAllowed:
        cpu: 100m
        memory: 256Mi
      maxAllowed:
        cpu: 2
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
